<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Form</title>
</head>
<body>
    <main>
        <aside>
            <img src="assets/halie-west-25xggax4bSA-unsplash.jpg" alt="leaves">
            <div class="odin">
                <div class="logo">
                    <img src="assets/odin-lined.png" alt="odin logo">
                </div>
                <div class="logo">
                    <h1>ODIN</h1>
                </div>
            </div>
            <footer>
                <p>Photo by <a href="#">Halie West</a> on <a href="#">Unsplash</a></p>
            </footer>
        </aside>
        <section>
            <div class="text">
            <p>This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams.</p>
            <p>Sign up <span>now</span> to get started.</p>
            <p>You <span>know</span> you want to.</p>
        </div>
        <fieldset>
            <legend><h2>Let's do this!</h2></legend>
            <form action="#" method="post">
                <div class="box">
                    <label for="first_name">First Name</label>
                    <input type="text" id="first_name" required min="3">
                </div>
                <div class="box">
                    <label for="email">Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="box">
                    <label for="password">Password</label>
                    <input type="passsword" id="password" required min="8">
                </div>
                <div class="box">
                    <label for="last_name">Last Name</label>
                    <input type="text" id="last_name" required min="3">
                </div>
                <div class="box">
                    <label for="number">Phone Number</label>
                    <input type="number" id="number" required min="3" max="10">
                </div>
                <div class="box">
                    <label for="confirm-pass">Confirm Password</label>
                    <input type="password" id="confirm-pass" required>
                </div>
            </form>
        </fieldset>
        <button type="submit">Create Account</button>
        <p>Already have an account? <a href="#">Log in</a></p>
        </section>
    </main>
</body>
</html>
